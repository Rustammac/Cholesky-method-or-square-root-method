<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Метод Холецкого — универсальный</title>

    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
  </head>
  <body>
    <nav class="controls">
      <div class="btn">
        <label for="size-input">Размер (n):</label>
        <input id="size-input" type="number" min="2" max="200" value="4" />
        <button id="create-btn">Создать</button>
        <button id="fill-example-btn">Пример (SPD)</button>
      </div>

      <div class="theme-toggle-container">
        <button id="theme-toggle">🌙</button>
      </div>
    </nav>

    <div class="matrix-container">
      <h1>Метод Холецкого</h1>

      <div class="matrix-grid-wrap">
        <div id="matrix-area" class="matrix-area"></div>

        <div class="divider-vertical"></div>

        <div id="vector-area" class="vector-area"></div>
      </div>

      <div id="result" class="result"></div>

      <div class="button-container">
        <button id="solve-btn" class="primary">Решить</button>
        <button id="reset-btn">Сброс</button>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
